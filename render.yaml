services:
  - type: web
    name: jarcade-api
    runtime: go
    plan: free
    buildCommand: go build -tags netgo -ldflags '-s -w' -o app .
    startCommand: ./app
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "8080"
      - key: JWT_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      # Optional — if password auth fails, API falls back to Supabase REST when keys above are set
      - key: DATABASE_URL
        sync: false
